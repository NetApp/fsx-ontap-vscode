name: Build and Publish Extension

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build extension
        run: npm run build:production
        env:
          TELEMETRY_KEY: ${{ secrets.TELEMETRY_KEY }}
          APPLICATION_INSIGHTS_KEY: ${{ secrets.APPLICATION_INSIGHTS_KEY }}
          TELEMETRY_HMAC_KEY: ${{ secrets.TELEMETRY_HMAC_KEY }}
          APPLICATION_INSIGHTS_HMAC_KEY: ${{ secrets.APPLICATION_INSIGHTS_HMAC_KEY }}

      - name: Package extension
        run: npm run package
        env:
          TELEMETRY_KEY: ${{ secrets.TELEMETRY_KEY }}
          TELEMETRY_HMAC_KEY: ${{ secrets.TELEMETRY_HMAC_KEY }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: extension-vsix
          path: "*.vsix"

  
